version: 2

updates:
  # Auth service Python deps
  - package-ecosystem: pip
    directory: /auth
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - python
    groups:
      auth-deps:
        patterns: ["*"]

  # Sidecar service Python deps
  - package-ecosystem: pip
    directory: /sidecar
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - python
    groups:
      sidecar-deps:
        patterns: ["*"]

  # Docker base images (auth + sidecar Dockerfiles share the same directory scan)
  - package-ecosystem: docker
    directory: /auth
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /sidecar
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions

