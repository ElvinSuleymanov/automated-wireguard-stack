services:
  unbound:
    image: mvance/unbound:latest
    container_name: unbound
    restart: unless-stopped
    hostname: unbound
    volumes:
      - ./shared/unbound:/opt/unbound/etc/unbound/
    networks:
      private_network:
        ipv4_address: ${IP_UNBOUND}
    env_file:
      - .env

  wireguard:
    image: linuxserver/wireguard
    container_name: wireguard
    networks:
      private_network:
        ipv4_address: ${IP_WG}
    depends_on:
      - unbound
      - pihole
    ports:
      - "${PORT_WG}:51820/udp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.conf.all.src_valid_mark: 1
      net.ipv4.ip_forward: 1
    volumes:
      - ./shared/wireguard:/config
    env_file:
      - .env

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    depends_on:
      - unbound
    ports:
      - "65231:80/tcp"
    hostname: pihole
    dns:
      - ${IP_UNBOUND}
      - 127.0.0.1
    volumes:
      - ./etc-pihole/:/etc/pihole/
      - ./etc-dnsmasq.d/:/etc/dnsmasq.d/
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    networks:
      private_network:
        ipv4_address: ${IP_PIHOLE}
    env_file:
      - .env
    environment:
      TZ: ${DETECTED_TZ}
      WEBPASSWORD: ${WEB_PASSWORD}
      PIHOLE_DNS_: "${IP_UNBOUND}#5053"

  nginx-proxy:
    image: nginx:latest
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - auth-service
    networks:
      private_network:
        ipv4_address: ${IP_NGINX}
  auth-service:
      build:
        context: .
        dockerfile: auth/Dockerfile.auth
        args:
          APP_PORT: ${PORT_AUTH}
      ports:
        - "${PORT_AUTH}:${PORT_AUTH}"
      container_name: auth_service
      restart: unless-stopped
      env_file:
        - .env
      networks:
        private_network:
          ipv4_address: ${IP_AUTH}


