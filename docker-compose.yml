services:
  unbound:
    image: mvance/unbound:latest
    container_name: unbound
    restart: unless-stopped
    hostname: unbound
    volumes:
      - ./unbound:/opt/unbound/etc/unbound/
    networks:
      private_network:
        ipv4_address: ${IP_UNBOUND}
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "drill @127.0.0.1 -p 5053 google.com || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    depends_on:
      unbound:
        condition: service_healthy
    ports:
      - "65231:80/tcp"
    hostname: pihole
    dns:
      - ${IP_UNBOUND}
      - 127.0.0.1
      - 1.1.1.1
    volumes:
      - ./etc-pihole/:/etc/pihole/
      - ./etc-dnsmasq.d/:/etc/dnsmasq.d/
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    networks:
      private_network:
        ipv4_address: ${IP_PIHOLE}
    env_file:
      - .env
    environment:
      TZ: ${DETECTED_TZ}
      WEBPASSWORD: ${WEBPASSWORD}
      PIHOLE_DNS_: "${IP_UNBOUND}#5053"
    healthcheck:
      test: [
        "CMD-SHELL", 
         "dig +short +timeout=2 @127.0.0.1 google.com > /dev/null || \
        dig +short +timeout=2 @${IP_UNBOUND} -p 5053 google.com > /dev/null || \
        dig +short +timeout=2 @8.8.8.8 google.com > /dev/null || \
        exit 1"
      ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

  wireguard:
    image: linuxserver/wireguard
    container_name: wireguard
    networks:
      private_network:
        ipv4_address: ${IP_WG}
    depends_on:
      unbound:
        condition: service_healthy
      pihole:
        condition: service_healthy
    ports:
      - "${PORT_WG}:51820/udp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.conf.all.src_valid_mark: 1
      net.ipv4.ip_forward: 1
    env_file:
      - .env
    environment:
        - PEERDNS=${IP_PIHOLE}
        - SERVERURL=${PUBLIC_IP}
        - SERVERPORT=${PORT_WG}
    healthcheck:
      test: ["CMD", "wg", "show", "wg0"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  wg-sidecar:
    build:
      context: ./sidecar
      dockerfile: Dockerfile.sidecar
    container_name: wg_sidecar
    restart: unless-stopped
    network_mode: "service:wireguard"
    depends_on:
      wireguard:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./wireguard:/config
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${PORT_SIDECAR}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  auth-service:
    build:
      context: ./auth
      dockerfile: Dockerfile.auth
    container_name: auth_service
    restart: unless-stopped
    depends_on:
      wg-sidecar:
        condition: service_healthy
    networks:
      private_network:
        ipv4_address: ${IP_AUTH}
    environment:
      - SIDECAR_URL=http://${IP_SIDECAR}:${PORT_SIDECAR}
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${PORT_AUTH}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  nginx-proxy:
    image: nginx:latest
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      auth-service:
        condition: service_healthy
    networks:
      private_network:
        ipv4_address: ${IP_NGINX}
    healthcheck:
      test: ["CMD-SHELL", "curl -kf https://localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  private_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.144.0/24