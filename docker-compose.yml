services:
  unbound:
    image: mvance/unbound:latest
    container_name: unbound
    restart: unless-stopped
    hostname: unbound
    volumes:
      - ./unbound:/opt/unbound/etc/unbound/
    networks:
      private_network:
        ipv4_address: ${IP_UNBOUND}
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "drill @127.0.0.1 -p 5053 google.com || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    depends_on:
      unbound:
        condition: service_healthy
    ports:
      - "65231:80/tcp"
    hostname: pihole
    volumes:
      - ./etc-pihole/:/etc/pihole/
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    networks:
      private_network:
        ipv4_address: ${IP_PIHOLE}
    env_file:
      - .env
    environment:
      TZ: ${DETECTED_TZ}
      FTLCONF_webserver_api_password: ${WEBPASSWORD}
      FTLCONF_dns_upstreams: "${IP_UNBOUND}#5053"
      FTLCONF_dns_listeningMode: all
    healthcheck:
      test: [
        "CMD-SHELL", 
         "dig +short +timeout=2 @127.0.0.1 google.com > /dev/null || \
        dig +short +timeout=2 @${IP_UNBOUND} -p 5053 google.com > /dev/null || \
        dig +short +timeout=2 @8.8.8.8 google.com > /dev/null || \
        exit 1"
      ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

  wireguard:
    build:
      context: ./wireguard
      dockerfile: Dockerfile.wireguard
    container_name: wireguard
    networks:
      private_network:
        ipv4_address: ${IP_WG}
    depends_on:
      unbound:
        condition: service_healthy
      pihole:
        condition: service_healthy
    ports:
      - "${PORT_WG}:51820/udp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.conf.all.src_valid_mark: 1
      net.ipv4.ip_forward: 1
    env_file:
      - .env
    volumes:
      - ./wireguard:/config
      - ./peers:/config/peers
    environment:
        - SERVERURL=${PUBLIC_IP}
        - SERVERPORT=${PORT_WG}
        - INTERNAL_SUBNET=${INTERNAL_SUBNET}
        - DNSSEC=true
        - PIHOLE_DNS_=${IP_PIHOLE}; 1.1.1.1, 8.8.8.8
    healthcheck:
      test: ["CMD", "wg", "show", "wg0"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  auth-service:
    build:
      context: ./auth
      dockerfile: Dockerfile.auth
    container_name: auth_service
    restart: unless-stopped
    depends_on:
      wireguard:
        condition: service_healthy
    networks:
      private_network:
        ipv4_address: ${IP_AUTH}
    env_file:
      - .env
    volumes:
      - ./peers:/app/peers
      - ./wireguard/keys/server_public.key:/wg-keys/server_public.key:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:${PORT_AUTH}/health\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx-proxy:
    image: nginx:alpine 
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      auth-service:
        condition: service_healthy
    networks:
      private_network:
        ipv4_address: ${IP_NGINX}
    healthcheck:
      test: ["CMD-SHELL", "curl --cacert /etc/nginx/certs/fullchain.pem https://localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  private_network:
    driver: bridge
    ipam:
      config:
        - subnet: ${SUBNET}